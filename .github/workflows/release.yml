name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build macOS
        run: npm run build:mac 2>&1 | tee build.log

      - name: Rename macOS assets for stable URLs
        shell: bash
        run: |
          for f in release/*.dmg; do
            [ -e "$f" ] && mv "$f" "release/Markdown-Notes.dmg"
          done
          ls -la release/

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-logs
          path: |
            build.log
            release/builder-debug.yml

      - name: Upload macOS assets
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Markdown-Notes.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    runs-on: windows-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build Windows
        run: npm run build:win 2>&1 | tee build.log

      - name: List Windows assets
        shell: bash
        run: ls -la release/

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: |
            build.log
            release/builder-debug.yml

      - name: Upload Windows assets
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Markdown-Notes.exe
            release/Markdown-Notes.exe.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
